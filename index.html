<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0d14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Daily Games">
<title>Daily Games Hub</title>
<!-- App icon as inline SVG data URI -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%230a0a12'/%3E%3Ccircle cx='96' cy='96' r='60' fill='none' stroke='%23e8ff47' stroke-width='8'/%3E%3Ctext x='96' y='116' text-anchor='middle' font-size='72' font-family='serif'%3E🎮%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%230a0a12'/%3E%3Ccircle cx='96' cy='96' r='60' fill='none' stroke='%23e8ff47' stroke-width='8'/%3E%3Ctext x='96' y='116' text-anchor='middle' font-size='72' font-family='serif'%3E🎮%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a12;
    --surface: #12121e;
    --surface2: #1a1a2e;
    --border: rgba(255,255,255,0.07);
    --accent: #e8ff47;
    --accent2: #ff6b6b;
    --accent3: #6bc5ff;
    --text: #f0f0f8;
    --muted: rgba(240,240,248,0.45);
    --card-radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
    padding-bottom: 100px;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  /* Header */
  .header {
    padding: 52px 20px 20px;
    position: relative;
  }

  .header-glow {
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 300px; height: 200px;
    background: radial-gradient(ellipse, rgba(232,255,71,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 4px;
  }

  .logo-mark {
    display: flex; align-items: center; gap: 8px;
  }

  .logo-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s ease-in-out infinite;
    box-shadow: 0 0 12px var(--accent);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.8); }
  }

  .header h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }

  .header h1 span { color: var(--accent); }

  .date-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 10px;
    letter-spacing: 0.5px;
  }

  .streak-bar {
    display: flex;
    gap: 8px;
    margin-top: 16px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
  }
  .streak-bar::-webkit-scrollbar { display: none; }

  .streak-chip {
    flex-shrink: 0;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--muted);
    background: var(--surface);
    white-space: nowrap;
  }

  /* Tab Nav */
  .tab-nav {
    display: flex;
    padding: 0 20px;
    gap: 4px;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .tab-btn {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    background: none;
    border: none;
    padding: 10px 14px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* Sections */
  .section { display: none; padding: 0 16px; }
  .section.active { display: block; }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    padding-left: 4px;
  }

  /* Game Cards */
  .games-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 28px;
  }

  .game-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    padding: 16px;
    cursor: pointer;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s, border-color 0.2s;
    -webkit-user-select: none;
  }

  .game-card:active { transform: scale(0.97); }

  .game-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--card-accent, var(--accent));
    opacity: 0.8;
  }

  .game-card-emoji {
    font-size: 28px;
    line-height: 1;
  }

  .game-card-name {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }

  .game-card-source {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .game-card-play {
    margin-top: auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .play-btn {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--card-accent, var(--accent));
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .play-btn svg { width: 12px; height: 12px; }

  .remove-btn {
    position: relative;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 2px;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    flex-shrink: 0;
    transition: color 0.2s, background 0.2s;
    overflow: visible;
  }
  .remove-btn > svg:first-child { width: 15px; height: 15px; position: relative; z-index: 1; }
  .remove-btn:active { color: var(--accent2); }
  .remove-btn.holding { color: var(--accent2); }

  /* Hold ring */
  .hold-ring {
    position: absolute;
    inset: -3px;
    width: calc(100% + 6px);
    height: calc(100% + 6px);
    pointer-events: none;
    transform: rotate(-90deg);
    z-index: 0;
  }
  .hold-ring circle {
    transition: none;
  }
  .remove-btn.holding .hold-ring circle {
    animation: fillRing 0.7s linear forwards;
  }
  @keyframes fillRing {
    from { stroke-dashoffset: 100; }
    to   { stroke-dashoffset: 0; }
  }

  .check-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    color: var(--muted);
    width: 26px; height: 26px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .check-btn svg { width: 12px; height: 12px; }
  .check-btn.checked {
    background: var(--card-accent, var(--accent));
    border-color: var(--card-accent, var(--accent));
    color: #0a0a12;
  }
  .check-btn:active { transform: scale(0.9); }

  .game-card.done {
    opacity: 0.72;
  }
  .game-card.done::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 8px,
      rgba(255,255,255,0.015) 8px,
      rgba(255,255,255,0.015) 9px
    );
    border-radius: var(--card-radius);
    pointer-events: none;
  }

  /* Full width card */
  .game-card.wide {
    grid-column: span 2;
    flex-direction: row;
    align-items: center;
    gap: 16px;
  }
  .game-card.wide .game-card-emoji { font-size: 36px; }
  .game-card.wide .game-card-play { flex-direction: column; align-items: flex-end; gap: 6px; }

  /* Discover */
  .discover-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    padding: 16px;
    margin-bottom: 12px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    position: relative;
  }

  .discover-emoji { font-size: 32px; flex-shrink: 0; }

  .discover-info { flex: 1; }

  .discover-name {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .discover-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    margin-bottom: 10px;
  }

  .discover-actions { display: flex; gap: 8px; }

  .btn-add {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    background: var(--accent);
    color: #0a0a12;
    border: none;
    border-radius: 8px;
    padding: 7px 14px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-add:active { opacity: 0.8; }
  .btn-add:disabled { background: var(--surface2); color: var(--muted); cursor: default; }

  .btn-visit {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 14px;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
  }

  .new-badge {
    position: absolute;
    top: 12px; right: 12px;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: var(--accent2);
    color: white;
    border-radius: 4px;
    padding: 2px 6px;
  }

  /* Add custom form */
  .add-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    padding: 18px;
    margin-bottom: 12px;
  }

  .add-form h3 {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 14px;
  }

  .form-row { margin-bottom: 10px; }

  .form-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    display: block;
    margin-bottom: 5px;
  }

  .form-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--accent); }

  .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .emoji-picker {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }

  .emoji-opt {
    font-size: 20px;
    background: var(--surface2);
    border: 2px solid transparent;
    border-radius: 8px;
    padding: 4px 8px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .emoji-opt.selected { border-color: var(--accent); }

  .color-picker {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 4px;
  }

  .color-opt {
    width: 24px; height: 24px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
  }
  .color-opt.selected { border-color: white; transform: scale(1.15); }

  .btn-submit {
    width: 100%;
    margin-top: 14px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    background: var(--accent);
    color: #0a0a12;
    border: none;
    border-radius: 10px;
    padding: 12px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-submit:active { opacity: 0.8; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #0a0a12;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 10px 20px;
    border-radius: 40px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .toast {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .toast-undo {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.5px;
    background: rgba(0,0,0,0.2);
    color: #0a0a12;
    border: none;
    border-radius: 20px;
    padding: 4px 10px;
    cursor: pointer;
    flex-shrink: 0;
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  /* Bottom Nav */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(10,10,18,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
    z-index: 100;
  }

  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.5px;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px 0;
    transition: color 0.2s;
    text-transform: uppercase;
  }

  .nav-btn.active { color: var(--accent); }

  .nav-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.5; }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }
  .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 13px; line-height: 1.6; }

  /* Reorder mode */
  .games-grid.reorder-mode .game-card { cursor: grab; border-color: rgba(232,255,71,0.2); }
  .game-card.dragging { opacity: 0.3; transform: scale(0.95); }
  .game-card.drag-over { border-color: var(--accent) !important; transform: scale(1.03); box-shadow: 0 0 0 2px var(--accent); }
  .reorder-btn { font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;background:none;border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:5px 12px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all 0.2s; }
  .reorder-btn.active { border-color:var(--accent);color:var(--accent); }

  /* Edit pencil btn */
  .edit-btn {
    position: relative;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 2px;
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    flex-shrink: 0;
    transition: color 0.2s;
  }
  .edit-btn svg { width: 13px; height: 13px; }
  .edit-btn:active { color: var(--accent3); }

  /* Edit modal */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 500;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-backdrop.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
    width: 100%;
    max-width: 480px;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(60px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  .modal-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 18px;
  }

  .modal h3 {
    font-size: 15px; font-weight: 800;
    margin-bottom: 16px;
  }

  .modal-actions {
    display: flex; gap: 8px; margin-top: 16px;
  }

  .btn-save {
    flex: 1;
    font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 700;
    background: var(--accent); color: #0a0a12;
    border: none; border-radius: 10px;
    padding: 12px; cursor: pointer;
  }
  .btn-cancel {
    font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 700;
    background: var(--surface2); color: var(--muted);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 18px; cursor: pointer;
  }

  /* Toast must allow pointer events when shown */
  .toast.show { pointer-events: all; }

</style>
</head>
<body>

<div class="header">
  <div class="header-glow"></div>
  <div class="header-top">
    <div class="logo-mark">
      <div class="logo-dot"></div>
      <h1>Daily<br><span>Games</span></h1>
    </div>
    <div class="date-badge" id="dateBadge"></div>
  </div>
  <div class="streak-bar" id="streakBar"></div>
</div>

<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('hub', this)">My Hub</button>
  <button class="tab-btn" onclick="switchTab('discover', this)">Discover</button>
  <button class="tab-btn" onclick="switchTab('add', this)">+ Add</button>
</div>

<!-- HUB TAB -->
<div class="section active" id="tab-hub">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:0 4px">
    <p class="section-label" style="margin-bottom:0">Today's Games</p>
    <button class="reorder-btn" id="reorderBtn" onclick="toggleReorder()">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      Reorder
    </button>
  </div>
  <div class="games-grid" id="gamesGrid"></div>
</div>

<!-- DISCOVER TAB -->
<div class="section" id="tab-discover">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:0 4px">
    <p class="section-label" style="margin-bottom:0">Today's picks</p>
    <button onclick="refreshDiscover()" style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;background:none;border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:5px 12px;cursor:pointer;display:flex;align-items:center;gap:5px" id="refreshBtn">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Refresh
    </button>
  </div>
  <div id="discoverList"></div>
</div>

<!-- ADD TAB -->
<div class="section" id="tab-add">
  <div class="add-form">
    <h3>Add a Custom Game</h3>
    <div class="form-row">
      <label class="form-label">Game Name</label>
      <input class="form-input" id="inputName" type="text" placeholder="e.g. Wordle Hebrew" />
    </div>
    <div class="form-row">
      <label class="form-label">URL</label>
      <input class="form-input" id="inputUrl" type="url" placeholder="https://..." />
    </div>
    <div class="form-row">
      <label class="form-label">Emoji Icon</label>
      <div class="emoji-picker" id="emojiPicker"></div>
    </div>
    <div class="form-row">
      <label class="form-label">Accent Color</label>

const COLORS = ['#e8ff47','#ff6b6b','#6bc5ff','#ffd700','#c084fc','#1db954','#ff9f43','#f472b6','#34d399','#60a5fa'];

// ── STATE ─────────────────────────────────────────────────────────────────────

let myGames = JSON.parse(localStorage.getItem('dailyGamesHub_v2') || 'null') || [...DEFAULT_GAMES];
let selectedEmoji = EMOJIS[0];
let selectedColor = COLORS[0];

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}
function getCompleted() {
  const raw = JSON.parse(localStorage.getItem('dailyGamesCompleted') || '{}');
  if (raw.date !== todayKey()) return {};
  return raw.ids || {};
}
function saveCompleted(ids) {
  localStorage.setItem('dailyGamesCompleted', JSON.stringify({ date: todayKey(), ids }));
}
function toggleCompleted(e, id) {
  e.preventDefault();
  e.stopPropagation();
  const completed = getCompleted();
  if (completed[id]) { delete completed[id]; } else { completed[id] = true; }
  saveCompleted(completed);
  renderHub();
}

// ── INIT ──────────────────────────────────────────────────────────────────────

function init() {
  // Date badge
  const now = new Date();
  document.getElementById('dateBadge').textContent =
    now.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' }).toUpperCase();

  // Streak chips
  buildStreakBar();

  // Render
  renderHub();
  renderDiscover();
  buildEmojiPicker();
  buildColorPicker();
}

function buildStreakBar() {
  const bar = document.getElementById('streakBar');
  const completed = getCompleted();
  const total = myGames.length;
  const doneCount = myGames.filter(g => completed[g.id]).length;
  bar.innerHTML = `<div class="streak-chip" style="border-color: var(--accent); color: var(--accent)">${doneCount}/${total} today</div>` +
    myGames.map(g => {
      const done = !!completed[g.id];
      return `<div class="streak-chip" style="${done ? 'border-color:rgba(232,255,71,0.4);color:var(--accent)' : ''}">${done ? '✓' : ''} ${g.emoji} ${g.name.split(' ')[0]}</div>`;
    }).join('');
}

// ── HUB ───────────────────────────────────────────────────────────────────────

function renderHub() {
  const grid = document.getElementById('gamesGrid');
  if (myGames.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:span 2">
      <div class="empty-icon">🎮</div>
      <p>No games yet.<br>Go to Discover or Add to get started.</p>
    </div>`;
    return;
  }

  const completed = getCompleted();
  grid.innerHTML = myGames.map((g, i) => {
    const done = !!completed[g.id];
    return `
    <a class="game-card ${g.wide ? 'wide' : ''} ${done ? 'done' : ''}"
       href="${g.url}" target="_blank"
       style="--card-accent: ${g.color}"
       data-id="${g.id}">
      <div>
        <div class="game-card-emoji">${g.emoji}</div>
      </div>
      <div style="flex:1">
        <div class="game-card-name">${g.name}</div>
        <div class="game-card-source">${g.source}</div>
        <div class="game-card-play">
          ${done
            ? `<span class="play-btn" style="color: var(--card-accent)">Done ✓</span>`
            : `<span class="play-btn">Play <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg></span>`
          }
          <div style="display:flex;gap:4px;align-items:center">
            <button class="edit-btn" onclick="openEditModal(event,'${g.id}')" title="Edit">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
            </button>
            <button class="check-btn ${done ? 'checked' : ''}" onclick="toggleCompleted(event, '${g.id}')" title="${done ? 'Mark incomplete' : 'Mark as done'}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            </button>
            <button class="remove-btn"
              onmousedown="startHold(event,'${g.id}')" ontouchstart="startHold(event,'${g.id}')"
              onmouseup="cancelHold()" onmouseleave="cancelHold()"
              ontouchend="cancelHold()" ontouchcancel="cancelHold()"
              title="Hold to remove">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
              </svg>
              <svg class="hold-ring" viewBox="0 0 36 36">
                <circle cx="18" cy="18" r="16" fill="none" stroke="var(--accent2)" stroke-width="2.5"
                  stroke-dasharray="100" stroke-dashoffset="100" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </a>
  `}).join('');

  buildStreakBar();
}

let lastRemoved = null;
let toastTimer = null;
let holdTimer = null;

function startHold(e, id) {
  e.preventDefault();
  e.stopPropagation();
  const btn = e.currentTarget;
  btn.classList.add('holding');
  holdTimer = setTimeout(() => {
    btn.classList.remove('holding');
    doRemove(id);
  }, 700);
}

function cancelHold() {
  if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
  document.querySelectorAll('.remove-btn.holding').forEach(b => b.classList.remove('holding'));
}

function doRemove(id) {
  const idx = myGames.findIndex(g => g.id === id);
  if (idx === -1) return;
  lastRemoved = { game: myGames[idx], idx };
  myGames = myGames.filter(g => g.id !== id);
  saveGames();
  renderHub();
  renderDiscover();
  // Show toast AFTER render so it's not wiped
  showToast(`${lastRemoved.game.emoji} ${lastRemoved.game.name} removed`, true);
}

function undoRemove() {
  if (!lastRemoved) return;
  const restored = lastRemoved;
  lastRemoved = null;
  if (toastTimer) { clearTimeout(toastTimer); toastTimer = null; }
  myGames.splice(restored.idx, 0, restored.game);
  saveGames();
  renderHub();
  renderDiscover();
  showToast('↩ Restored!');
}

// ── DISCOVER ──────────────────────────────────────────────────────────────────

// ── DISCOVER LOGIC ────────────────────────────────────────────────────────────

// Seeded deterministic shuffle — same seed = same order, no randomness leaking in
function seededShuffle(arr, seed) {
  const a = [...arr];
  let s = (seed ^ 0xdeadbeef) >>> 0;
  for (let i = a.length - 1; i > 0; i--) {
    s = Math.imul(s ^ (s >>> 16), 0x45d9f3b);
    s = Math.imul(s ^ (s >>> 16), 0x45d9f3b);
    s = (s ^ (s >>> 16)) >>> 0;
    const j = s % (i + 1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getDailySeed() {
  const d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
}

// Store: { date, offset } — offset advances on each refresh, resets each day
function getDiscoverState() {
  try {
    const raw = JSON.parse(localStorage.getItem('discoverState') || '{}');
    if (raw.date === todayKey()) return raw;
  } catch(e) {}
  const fresh = { date: todayKey(), offset: 0 };
  localStorage.setItem('discoverState', JSON.stringify(fresh));
  return fresh;
}

function refreshDiscover() {
  const state = getDiscoverState();
  // Pool of games not yet in hub
  const pool = DISCOVER_GAMES.filter(g => !myGames.some(m => m.id === g.id));
  // Advance offset by 5, wrapping around the full pool
  state.offset = (state.offset + 5) % Math.max(pool.length, 1);
  localStorage.setItem('discoverState', JSON.stringify(state));

  const btn = document.getElementById('refreshBtn');
  btn.style.transition = 'transform 0.5s cubic-bezier(.36,.07,.19,.97)';
  btn.style.transform = 'rotate(360deg)';
  setTimeout(() => { btn.style.transform = 'rotate(0deg)'; btn.style.transition = 'none'; }, 500);
  renderDiscover();
}

function renderDiscover() {
  const list = document.getElementById('discoverList');
  const state = getDiscoverState();

  // All games not in hub, shuffled deterministically by today's date
  const notAdded = DISCOVER_GAMES.filter(g => !myGames.some(m => m.id === g.id));
  const shuffled = seededShuffle(notAdded, getDailySeed());

  // Slice a window of 5 starting at offset — wrap around with no repeats
  const count = Math.min(5, shuffled.length);
  const picks = [];
  for (let i = 0; i < count; i++) {
    picks.push(shuffled[(state.offset + i) % shuffled.length]);
  }

  // Already-added games shown at bottom
  const alreadyAdded = DISCOVER_GAMES.filter(g => myGames.some(m => m.id === g.id));
  const toShow = [...picks, ...alreadyAdded];

  list.innerHTML = toShow.map(g => {
    const inHub = myGames.some(m => m.id === g.id);
    return `
      <div class="discover-card">
        ${g.isNew ? '<span class="new-badge">New</span>' : ''}
        <div class="discover-emoji">${g.emoji}</div>
        <div class="discover-info">
          <div class="discover-name">${g.name}</div>
          <div class="discover-desc">${g.desc}</div>
          <div class="discover-actions">
            <button class="btn-add" ${inHub ? 'disabled' : ''} onclick="addFromDiscover('${g.id}')">
              ${inHub ? '✓ Added' : '+ Add to Hub'}
            </button>
            <a class="btn-visit" href="${g.url}" target="_blank">Visit ↗</a>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function addFromDiscover(id) {
  const g = DISCOVER_GAMES.find(d => d.id === id);
  if (!g || myGames.some(m => m.id === id)) return;
  myGames.push({ id: g.id, name: g.name, emoji: g.emoji, source: g.source, url: g.url, color: g.color, wide: false });
  saveGames();
  renderHub();
  renderDiscover();
  showToast(`${g.name} added!`);
}

// ── ADD CUSTOM ────────────────────────────────────────────────────────────────

function buildEmojiPicker() {
  document.getElementById('emojiPicker').innerHTML = EMOJIS.map((e, i) =>
    `<span class="emoji-opt ${i === 0 ? 'selected' : ''}" onclick="selectEmoji('${e}', this)">${e}</span>`
  ).join('');
}

function buildColorPicker() {
  document.getElementById('colorPicker').innerHTML = COLORS.map((c, i) =>
    `<div class="color-opt ${i === 0 ? 'selected' : ''}" style="background:${c}" onclick="selectColor('${c}', this)"></div>`
  ).join('');
}

function selectEmoji(e, el) {
  selectedEmoji = e;
  document.querySelectorAll('.emoji-opt').forEach(x => x.classList.remove('selected'));
  el.classList.add('selected');
}

function selectColor(c, el) {
  selectedColor = c;
  document.querySelectorAll('.color-opt').forEach(x => x.classList.remove('selected'));
  el.classList.add('selected');
}

function addCustomGame() {
  const name = document.getElementById('inputName').value.trim();
  const url = document.getElementById('inputUrl').value.trim();
  const source = document.getElementById('inputSource').value.trim();

  if (!name || !url) { showToast('Name and URL are required'); return; }

  const id = 'custom_' + Date.now();
  myGames.push({ id, name, emoji: selectedEmoji, source: source || 'Custom', url, color: selectedColor, wide: false });
  saveGames();
  renderHub();
  renderDiscover();

  // Clear
  document.getElementById('inputName').value = '';
  document.getElementById('inputUrl').value = '';
  document.getElementById('inputSource').value = '';
  showToast(`${name} added to Hub!`);
  switchTab('hub', document.querySelector('.tab-btn'));
}

// ── UTILS ─────────────────────────────────────────────────────────────────────

function saveGames() {
  localStorage.setItem('dailyGamesHub_v2', JSON.stringify(myGames));
}

function showToast(msg, withUndo = false) {
  const t = document.getElementById('toast');
  if (toastTimer) { clearTimeout(toastTimer); toastTimer = null; }
  const undoBtn = document.getElementById('toastUndo');
  document.getElementById('toastMsg').textContent = msg;
  undoBtn.style.display = withUndo ? '' : 'none';
  t.classList.add('show');
  const delay = withUndo ? 5000 : 2000;
  toastTimer = setTimeout(() => { hideToast(); lastRemoved = null; }, delay);
}

function hideToast() {
  document.getElementById('toast').classList.remove('show');
}

function switchTab(tab, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  btn.classList.add('active');
}

// ── REORDER (reliable drag for mouse + touch) ────────────────────────────────

let reorderMode = false;
let dragSrcId = null;

function toggleReorder() {
  reorderMode = !reorderMode;
  const grid = document.getElementById('gamesGrid');
  const btn  = document.getElementById('reorderBtn');
  if (reorderMode) {
    grid.classList.add('reorder-mode');
    btn.classList.add('active');
    btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg> Done`;
    // Enable draggable on all cards
    grid.querySelectorAll('.game-card').forEach(card => {
      card.setAttribute('draggable', 'true');
      card.addEventListener('dragstart',  handleDragStart);
      card.addEventListener('dragover',   handleDragOver);
      card.addEventListener('dragleave',  handleDragLeave);
      card.addEventListener('drop',       handleDrop);
      card.addEventListener('dragend',    handleDragEnd);
      card.addEventListener('touchstart', handleTouchStart, {passive:false});
      card.addEventListener('touchmove',  handleTouchMove,  {passive:false});
      card.addEventListener('touchend',   handleTouchEnd);
    });
  } else {
    grid.classList.remove('reorder-mode');
    btn.classList.remove('active');
    btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg> Reorder`;
  }
}

// Mouse drag
function handleDragStart(e) {
  dragSrcId = this.dataset.id;
  setTimeout(() => this.classList.add('dragging'), 0);
  e.dataTransfer.effectAllowed = 'move';
}
function handleDragOver(e) {
  e.preventDefault();
  if (this.dataset.id === dragSrcId) return;
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  this.classList.add('drag-over');
}
function handleDragLeave(e) {
  if (!this.contains(e.relatedTarget)) this.classList.remove('drag-over');
}
function handleDrop(e) {
  e.preventDefault();
  this.classList.remove('drag-over');
  if (!dragSrcId || this.dataset.id === dragSrcId) return;
  reorderGames(dragSrcId, this.dataset.id);
}
function handleDragEnd() {
  this.classList.remove('dragging');
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  dragSrcId = null;
}

// Touch drag
let touchClone = null, touchSrcId = null, touchOffX = 0, touchOffY = 0;
function handleTouchStart(e) {
  if (e.target.closest('button')) return;
  e.preventDefault();
  touchSrcId = this.dataset.id;
  const t = e.touches[0];
  const rect = this.getBoundingClientRect();
  touchOffX = t.clientX - rect.left;
  touchOffY = t.clientY - rect.top;
  touchClone = this.cloneNode(true);
  touchClone.style.cssText = `position:fixed;top:${rect.top}px;left:${rect.left}px;width:${rect.width}px;height:${rect.height}px;pointer-events:none;z-index:9999;opacity:0.85;transform:scale(1.05) rotate(1deg);border:2px solid var(--accent);border-radius:16px;transition:none;`;
  document.body.appendChild(touchClone);
  this.classList.add('dragging');
}
function handleTouchMove(e) {
  if (!touchSrcId) return;
  e.preventDefault();
  const t = e.touches[0];
  touchClone.style.left = (t.clientX - touchOffX) + 'px';
  touchClone.style.top  = (t.clientY - touchOffY) + 'px';
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  const el = document.elementFromPoint(t.clientX, t.clientY);
  const target = el?.closest('.game-card[data-id]');
  if (target && target.dataset.id !== touchSrcId) target.classList.add('drag-over');
}
function handleTouchEnd(e) {
  if (!touchSrcId) return;
  const t = e.changedTouches[0];
  if (touchClone) { touchClone.remove(); touchClone = null; }
  document.querySelectorAll('.game-card.dragging').forEach(c => c.classList.remove('dragging'));
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  const el = document.elementFromPoint(t.clientX, t.clientY);
  const target = el?.closest('.game-card[data-id]');
  if (target && target.dataset.id !== touchSrcId) reorderGames(touchSrcId, target.dataset.id);
  touchSrcId = null;
}

function reorderGames(fromId, toId) {
  const fromIdx = myGames.findIndex(g => g.id === fromId);
  const toIdx   = myGames.findIndex(g => g.id === toId);
  if (fromIdx === -1 || toIdx === -1) return;
  const [moved] = myGames.splice(fromIdx, 1);
  myGames.splice(toIdx, 0, moved);
  saveGames();
  renderHub();
  // Re-enable reorder mode after re-render
  if (reorderMode) { reorderMode = false; toggleReorder(); }
}

// ── EDIT MODAL ────────────────────────────────────────────────────────────────

let editingId = null;
let editEmoji = '';
let editColor = '';

function openEditModal(e, id) {
  e.preventDefault();
  e.stopPropagation();
  const g = myGames.find(g => g.id === id);
  if (!g) return;
  editingId = id;
  editEmoji = g.emoji;
  editColor = g.color;
  document.getElementById('editName').value   = g.name;
  document.getElementById('editUrl').value    = g.url;
  document.getElementById('editSource').value = g.source;
  // Emoji picker
  document.getElementById('editEmojiPicker').innerHTML = EMOJIS.map(em =>
    `<span class="emoji-opt ${em === g.emoji ? 'selected' : ''}" onclick="selectEditEmoji('${em}',this)">${em}</span>`
  ).join('');
  // Color picker
  document.getElementById('editColorPicker').innerHTML = COLORS.map(c =>
    `<div class="color-opt ${c === g.color ? 'selected' : ''}" style="background:${c}" onclick="selectEditColor('${c}',this)"></div>`
  ).join('');
  document.getElementById('editModal').classList.add('open');
}

function closeEditModal(e) {
  if (e && e.target !== document.getElementById('editModal')) return;
  document.getElementById('editModal').classList.remove('open');
  editingId = null;
}

function selectEditEmoji(em, el) {
  editEmoji = em;
  document.querySelectorAll('#editEmojiPicker .emoji-opt').forEach(x => x.classList.remove('selected'));
  el.classList.add('selected');
}

function selectEditColor(c, el) {
  editColor = c;
  document.querySelectorAll('#editColorPicker .color-opt').forEach(x => x.classList.remove('selected'));
  el.classList.add('selected');
}

function saveEdit() {
  if (!editingId) return;
  const idx = myGames.findIndex(g => g.id === editingId);
  if (idx === -1) return;
  myGames[idx] = {
    ...myGames[idx],
    name:   document.getElementById('editName').value.trim()   || myGames[idx].name,
    url:    document.getElementById('editUrl').value.trim()    || myGames[idx].url,
    source: document.getElementById('editSource').value.trim() || myGames[idx].source,
    emoji:  editEmoji,
    color:  editColor,
  };
  saveGames();
  renderHub();
  document.getElementById('editModal').classList.remove('open');
  editingId = null;
  showToast('Saved ✓');
}

init();
</script>
